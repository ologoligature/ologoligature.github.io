<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <style>
        body { font-family: 'Google Sans',Roboto,Arial,sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #fff; }
        .box { width: 100%; max-width: 450px; padding: 40px; text-align: center; border: 1px solid #dadce0; border-radius: 8px; }
        @media (max-width: 450px) { .box { border: none; } }
        img { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin: 0 0 10px; color: #202124; }
        p { font-size: 16px; margin-bottom: 30px; }
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        input:focus { border: 2px solid #1a73e8; outline: none; padding: 12px 14px; }
        .flex { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .btn { background: #1a73e8; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; }
        a { color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <input type="email" placeholder="Email or phone" id="e">
        <div style="text-align: left;"><a href="#">Forgot email?</a></div>
        <div class="flex">
            <a href="#">Create account</a>
            <button class="btn" onclick="alert('CAPTURED: ' + document.getElementById('e').value)">Next</button>
        </div>
    </div>
</body>
</html>
